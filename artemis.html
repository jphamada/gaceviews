<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cómo es la misión Artemis II</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 20px 16px 16px;
    }

    /* ── Encabezado ── */
    header {
      width: 100%;
      max-width: 800px;
      margin-bottom: 12px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #111;
      line-height: 1.25;
      margin-bottom: 4px;
    }

    header p {
      font-size: 13px;
      color: #666;
    }

    /* ── Contenedor imagen ── */
    .scene {
      position: relative;
      width: 100%;
      max-width: 800px;
    }

    .scene img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 4px;
    }

    /* ── Puntos ── */
    .dot {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: #fff;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      z-index: 10;
      border: 2px solid rgba(255,255,255,0.35);
    }

    .dot:hover           { transform: translate(-50%, -50%) scale(1.3); }
    .dot.active          { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 0 4px rgba(0,0,0,0.12); }
    .dot.red             { background: #c0392b; }
    .dot.blue            { background: #2471a3; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
      50%       { box-shadow: 0 0 0 5px rgba(0,0,0,0.10); }
    }
    .dot                 { animation: pulse 3s ease-in-out infinite; }
    .dot:hover, .dot.active { animation: none; }

    /* ── Tarjeta ── */
    .card {
      position: absolute;
      width: 230px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 12px 14px;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transform: translateY(6px) scale(0.97);
      transition: opacity 0.16s ease, transform 0.16s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    }

    .card.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .card-num {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .card.red  .card-num { color: #c0392b; }
    .card.blue .card-num { color: #2471a3; }

    .card-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #111;
      margin-bottom: 6px;
      line-height: 1.4;
      padding-right: 18px;
    }

    .card-body {
      font-size: 11.5px;
      color: #555;
      line-height: 1.6;
    }

    .card-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 18px;
      height: 18px;
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: color 0.1s;
    }
    .card-close:hover { color: #333; }

    /* ── Créditos ── */
    footer {
      width: 100%;
      max-width: 800px;
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    footer span {
      font-size: 10px;
      color: #aaa;
      letter-spacing: 0.04em;
    }

    footer span b {
      font-weight: 600;
      color: #888;
    }
  </style>
</head>
<body>

  <header>
    <h1>Cómo es la misión Artemis II</h1>
    <p>Hacé click en un punto para ver información de cada etapa</p>
  </header>

  <div class="scene" id="scene">
    <img src="images/trayecto.jpg" alt="Trayectoria Misión Artemis II" id="img" draggable="false">
  </div>

  <footer>
    <span>Imagen y textos: <b>NASA</b></span>
    <span>Interactivo: <b>LA GACETA</b></span>
  </footer>

  <script>
    const points = [
      { n:1,  x:23.75, y:16.64, color:'red',  title:'Lanzamiento',                         body:'Los astronautas despegan desde la plataforma de lanzamiento 39B en el Centro Espacial Kennedy.' },
      { n:2,  x:27.25, y:16.64, color:'red',  title:'Desprendimiento',                     body:'Se separan los cohetes aceleradores sólidos, los carenados y el sistema de aborto de lanzamiento.' },
      { n:3,  x:30.75, y:15.67, color:'red',  title:'Corte del motor principal',            body:'Se produce el apagado del motor y la separación de la etapa central.' },
      { n:4,  x:35.38, y:14.21, color:'red',  title:'Maniobra de elevación del perigeo',    body:'Ajuste de la trayectoria orbital inicial.' },
      { n:5,  x:9.00,  y:45.33, color:'red',  title:'Encendido — Elevación del apogeo',     body:'Comienza una revisión técnica de la nave espacial que dura 23.5 horas.' },
      { n:6,  x:14.37, y:58.46, color:'red',  title:'Separación de Orion',                  body:'La nave Orion se separa de la Etapa de Propulsión Criogénica Interina (ICPS). Se realiza una demostración de operaciones de proximidad de hasta 2 horas.' },
      { n:7,  x:42.38, y:46.55, color:'blue', title:'Encendido separación USS',             body:'Inicia la revisión en órbita terrestre alta. Se evalúan los sistemas de soporte vital, equipos de ejercicio y habitabilidad.' },
      { n:8,  x:55.38, y:6.18,  color:'red',  title:'Encendido — Elevación del perigeo',    body:'Ajuste adicional de la órbita.' },
      { n:9,  x:3.62,  y:52.14, color:'red',  title:'Inyección trans-lunar (TLI)',          body:'Realizada por el motor principal de Orion. Se inicia la trayectoria de retorno libre lunar con el módulo de servicio europeo.' },
      { n:10, x:33.25, y:68.92, color:'red',  title:'Tránsito de salida hacia la Luna',     body:'Se realizan encendidos de corrección de trayectoria (OTC) según sea necesario. El tiempo de viaje es de aproximadamente 4 días.' },
      { n:11, x:98.25, y:80.34, color:'blue', title:'Sobrevuelo lunar',                     body:'La nave pasa por el lado lejano de la Luna a una altitud media de 4,047 millas (6,513 km).' },
      { n:12, x:66.38, y:84.72, color:'blue', title:'Regreso trans-tierra',                 body:'Encendidos de corrección (RTC) para apuntar a la atmósfera terrestre. El viaje de vuelta dura unos 4 días.' },
      { n:13, x:46.00, y:17.86, color:'blue', title:'Separación del módulo de tripulación', body:'La cápsula donde viajan los astronautas se desprende del módulo de servicio.' },
      { n:14, x:13.75, y:11.53, color:'red',  title:'Interfaz de entrada (EI)',              body:'La nave entra en la atmósfera de la Tierra.' },
      { n:15, x:11.63, y:22.96, color:'red',  title:'Amerizaje',                            body:'La cápsula cae al océano y un barco recupera tanto a los astronautas como a la nave.' },
    ];

    const scene = document.getElementById('scene');
    let activeCard = null;
    let activeDot  = null;

    points.forEach(p => {
      const dot = document.createElement('div');
      dot.className = `dot ${p.color}`;
      dot.style.left = p.x + '%';
      dot.style.top  = p.y + '%';
      dot.textContent = p.n;
      dot.dataset.id = p.n;

      const card = document.createElement('div');
      card.className = `card ${p.color}`;
      card.dataset.id = p.n;
      card.innerHTML = `
        <button class="card-close" aria-label="Cerrar">✕</button>
        <div class="card-num">Paso ${p.n} de 15</div>
        <div class="card-title">${p.title}</div>
        <div class="card-body">${p.body}</div>
      `;

      scene.appendChild(dot);
      scene.appendChild(card);

      dot.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = card.classList.contains('visible');
        closeAll();
        if (!isOpen) openCard(dot, card);
      });

      card.querySelector('.card-close').addEventListener('click', (e) => {
        e.stopPropagation();
        closeAll();
      });
    });

    function openCard(dot, card) {
      activeDot  = dot;
      activeCard = card;
      dot.classList.add('active');
      positionCard(dot, card);
      card.classList.add('visible');
    }

    function positionCard(dot, card) {
      const dx     = parseFloat(dot.style.left);
      const dy     = parseFloat(dot.style.top);
      const CARD_W = 230;
      const sceneW = scene.offsetWidth;
      const sceneH = scene.offsetHeight;
      const cardH  = 130;
      const pxX    = dx / 100 * sceneW;
      const pxY    = dy / 100 * sceneH;
      const gap    = 12;

      let left, right;
      if (pxX + CARD_W + gap < sceneW - 8) {
        left = (pxX + gap) + 'px'; right = 'auto';
      } else {
        left = 'auto'; right = (sceneW - pxX + gap) + 'px';
      }

      let top = (pxY - 20) + 'px';
      if (pxY + cardH > sceneH - 8) top = (pxY - cardH + 20) + 'px';

      card.style.left  = left;
      card.style.right = right;
      card.style.top   = top;
    }

    function closeAll() {
      document.querySelectorAll('.card.visible').forEach(c => c.classList.remove('visible'));
      document.querySelectorAll('.dot.active').forEach(d => d.classList.remove('active'));
      activeCard = null;
      activeDot  = null;
    }

    document.addEventListener('click', closeAll);
    scene.addEventListener('click', (e) => e.stopPropagation());
    window.addEventListener('resize', () => {
      if (activeCard && activeDot) positionCard(activeDot, activeCard);
    });
  </script>
</body>
</html>
